apiVersion: v1
kind: Service
metadata:
  name: saas-app-service
  namespace: saas-app
  annotations:
    # DigitalOcean Load Balancer annotations
    service.beta.kubernetes.io/do-loadbalancer-name: "saas-app-lb"
    service.beta.kubernetes.io/do-loadbalancer-size-slug: "lb-small"   # Cost-optimised size
    service.beta.kubernetes.io/do-loadbalancer-algorithm: "round_robin" # Distribute traffic evenly
    service.beta.kubernetes.io/do-loadbalancer-sticky-sessions-type: "none"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-path: "/health"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-interval-seconds: "10"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-response-timeout-seconds: "5"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-unhealthy-threshold: "3"
    service.beta.kubernetes.io/do-loadbalancer-healthcheck-healthy-threshold: "2"
    # Redirect HTTP to HTTPS (uncomment when TLS cert is added)
    # service.beta.kubernetes.io/do-loadbalancer-redirect-http-to-https: "true"
  labels:
    app: saas-app
spec:
  type: LoadBalancer                  # Provisions a DigitalOcean Load Balancer
  selector:
    app: saas-app
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
